<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tabmd</title>
    <link rel="stylesheet" href="../shared/theme.css" />
  </head>
  <body>
    <div class="page">
      <header class="app-bar">
        <div>
          <h1>tabmd</h1>
          <p class="subtitle"><span id="collectionCount">0</span> collections</p>
        </div>
        <div class="app-search">
          <label class="visually-hidden" for="searchCollections">Search collections</label>
          <input id="searchCollections" type="search" placeholder="Search resources" />
        </div>
        <div class="app-actions">
          <button id="scrollTop" type="button" class="icon-button" aria-label="Scroll to top" title="Scroll to top">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4l5 5h-3v11h-4V9H7z" fill="currentColor" /></svg>
          </button>
          <button
            id="scrollBottom"
            type="button"
            class="icon-button"
            aria-label="Scroll to bottom"
            title="Scroll to bottom"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20l-5-5h3V4h4v11h3z" fill="currentColor" /></svg>
          </button>
          <button id="toggleIo" type="button" class="icon-button" aria-label="Export and import" title="Export and import">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="12" height="3" rx="1.5" fill="currentColor" />
              <rect x="4" y="11" width="16" height="3" rx="1.5" fill="currentColor" />
              <rect x="4" y="17" width="12" height="3" rx="1.5" fill="currentColor" />
            </svg>
          </button>
        </div>
      </header>
      <main class="content">
        <section id="ioPanel" class="io-panel" hidden>
          <div class="io-header">Export / Import</div>
          <textarea id="jsonArea" rows="8" spellcheck="false"></textarea>
          <div class="io-actions">
            <button id="exportJson" type="button" class="text-button">Export</button>
            <button id="importJson" type="button" class="text-button">Import</button>
            <button id="clearJson" type="button" class="text-button">Clear</button>
          </div>
        </section>
        <section class="hero-card surface-card">
          <div>
            <p class="eyebrow">Skeleton</p>
            <h2>Replace this page with your extension UI</h2>
            <p>
              The build, test, workflow, and page structure are ready. The feature logic is intentionally minimal.
            </p>
          </div>
          <a class="hero-link" href="options.html">Open settings</a>
        </section>
        <section class="list-section">
          <div id="empty" class="empty" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="6" width="14" height="10" rx="2" />
              <path d="M7 9h8M7 12h5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <div>No collections configured</div>
          </div>
          <div id="collections" class="group-list"></div>
        </section>
        <div id="snackbar" class="snackbar" role="status" aria-live="polite"></div>
      </main>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
